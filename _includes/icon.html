{% assign size = include.size | default: 20 %}
{% assign name = include.name | default: "arrow-right" %}
<svg class="icon icon--{{ name }}" width="{{ size }}" height="{{ size }}" viewBox="0 0 24 24" aria-hidden="true" focusable="false" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  {% case name %}
    {% when "menu" %}
      <path d="M4 7h16"></path><path d="M4 12h16"></path><path d="M4 17h16"></path>
    {% when "x" %}
      <path d="M18 6 6 18"></path><path d="m6 6 12 12"></path>

        <ellipse cx="10.1" cy="7.5" rx="2" ry="2.7"></ellipse>
        <ellipse cx="13.9" cy="7.5" rx="2" ry="2.7"></ellipse>
        <ellipse cx="17.7" cy="11" rx="1.9" ry="2.5"></ellipse>

      <path d="M14.7 6.3a4 4 0 0 0-5 5L3 18l3 3 6.7-6.7a4 4 0 0 0 5-5l-2.4 2.4-3-3z"></path>

    {% when "check" %}

      <path d="m6 9 6 6 6-6"></path>
    {% when "arrow-left" %}
      <path d="M19 12H5"></path><path d="m11 18-6-6 6-6"></path>
    {% else %}
      <path d="M5 12h14"></path><path d="m13 6 6 6-6 6"></path>
  {% endcase %}
