{% assign service = include.service %}
{% assign card_image = service.card_image | default: service.image %}
<!-- COMPONENT 4: Service overview card grid -->
<article class="service-card{% if include.featured %} service-card--featured{% endif %}" data-reveal>
  <a class="service-card__media" href="{{ service.url | relative_url }}" aria-label="{{ service.title }} ansehen" tabindex="-1" aria-hidden="true">
    <img src="{{ card_image | relative_url }}" alt="" loading="lazy" decoding="async">
  </a>
  <div class="service-card__body">
    <span class="service-card__icon">{% include icon.html name=service.icon size=20 %}</span>
    <p class="service-card__meta">{{ service.meta }}</p>
    <h3><a href="{{ service.url | relative_url }}">{{ service.title }}</a></h3>
    <p>{{ service.short }}</p>
    <a class="text-link" href="{{ service.url | relative_url }}">Zur Leistung{% include icon.html name="arrow-right" size=16 %}</a>
  </div>
</article>
<!-- /COMPONENT 4 -->
