process:
  - number: "01"
    title: "Anfrage senden"
    text: "Sie beschreiben die Arbeit, den Ort und wenn möglich die wichtigsten Masse. Oder Sie rufen direkt an."
  - number: "02"
    title: "Rückfragen"
    text: "Wir klären Material, Zugang, Zeitpunkt und ob Fotos oder eine Besichtigung nötig sind."
  - number: "03"
    title: "Besichtigung"
    text: "Wenn Fotos nicht reichen, schauen wir die Situation vor Ort an."
  - number: "04"
    title: "Offerte"
    text: "Sie erhalten eine nachvollziehbare Offerte für den klar abgegrenzten Umfang."
  - number: "05"
    title: "Ausführung"
    text: "Nach Ihrer Zusage wird die Arbeit geplant, umgesetzt und persönlich übergeben."

home_faq:
  - question: "Wie starte ich eine Anfrage?"
    answer: "Wählen Sie im Formular die passende Leistung und beschreiben Sie Ort, Situation und gewünschte Arbeit. Wenn Sie unsicher sind, wählen Sie \"Noch unsicher\" oder rufen Sie direkt an."
  - question: "Erhalte ich eine Offerte?"
    answer: "Ja. Nach den Rückfragen oder einer Besichtigung erhalten Sie eine nachvollziehbare Offerte für den vereinbarten Umfang."
  - question: "Übernehmen Sie auch kleine Arbeiten?"
    answer: "Ja. Kleinere Reparaturen, Montagen, Wohnungsaufbereitung und praktische Arbeiten rund um Liegenschaften gehören ausdrücklich zum Angebot."
  - question: "Macht HandwerksPartner24 Küchen alleine?"
    answer: "Küchenprojekte setzen wir je nach Umfang gemeinsam mit unserem Küchenpartner um. Ihre Anfrage stellen Sie trotzdem direkt bei HandwerksPartner24, wir koordinieren den nächsten Schritt."

