items:
  - slug: "katzennetze"
    title: "Katzennetze, Katzentürli & Katzenleitern"
    nav_title: "Katzennetze"
    url: "/leistungen/katzennetze/"
    icon: "paw"
    image: "/assets/images/site/katzennetz.webp"
    card_image: "/assets/images/site/katzennetz-card.webp"
    image_alt: "Katzennetz als sichere Lösung für einen Balkon"
    short: "Katzenschutz für Balkon, Sitzplatz, Fenster und Garten, sauber abgeklärt vor der Montage."
    meta: "Balkon, Fenster, Sitzplatz und Garten"
    cta: "Katzennetz-Offerte anfragen"
    hero_title: "Katzennetze, Katzentürli und Katzenleitern sauber geplant und montiert."
    hero_text: "Ob Balkon, Sitzplatz, Fenster oder Garten: Sie beschreiben, was gesichert werden soll. Wir prüfen Befestigung, Material und Nutzung und schlagen Ihnen die passende Katzenschutz-Lösung vor."
    detail_title: "Katzenschutz, der zur Wohnung passt."
    detail_text: "Jeder Balkon, jedes Fenster und jeder Sitzplatz hat andere Befestigungspunkte. Wir klären, welche Montage möglich ist, welche Netzvariante passt und wie die Lösung im Alltag genutzt wird."
    bullets_title: "Mögliche Arbeiten"
    bullets:
      - "Katzennetze für Balkon, Laube und Sitzplatz"
      - "Katzentürli für mehr Bewegungsfreiheit"
      - "Katzenleitern für geeignete Zugänge vom Aussenbereich"
      - "Netzvarianten mit Beissschutz"
      - "Feinmaschige Lösungen mit Insektenschutz auf Anfrage"
    fit_title: "Geeignet für"
    fit:
      - "Katzenhalter in Miet- und Eigentumswohnungen"
      - "Eigentümer mit Balkon, Terrasse oder Garten"
      - "Haushalte, die Fenster, Türen oder Aussenbereiche sicherer nutzen möchten"
    problems_title: "Häufige Ausgangslagen"
    problems:
      - "Sturzgefahr auf Balkon oder am Fenster"
      - "Ungesicherte Ausgänge"
      - "Mehr Bewegungsfreiheit ohne ständige Aufsicht"
      - "Insekten trotz geöffnetem Fenster"
    mascot:
      eyebrow: "Qualitätskontrolle"
      title: "Kara hat alles abgenommen."
      text: "Mehr Freiheit für Ihre Katze, mehr Sicherheit für Ihr Zuhause: Unsere Bürokatze Kara geniesst sicheren Freigang und ist der Grund, warum wir bei jeder Lösung auf sauberen Sitz, Bewegungsfreiheit und Alltagstauglichkeit achten."
      image: "/assets/images/site/kara-katzennetz.webp"
      image_alt: "Kara, die Bürokatze von HandwerksPartner24, im Garten"
    process_title: "So entsteht Ihre Katzenschutz-Lösung."
    process:
      - number: "01"
        title: "Fotos oder Skizze senden"
        text: "Sie beschreiben Balkon, Fenster, Sitzplatz oder Garten und nennen, was gesichert werden soll."
      - number: "02"
        title: "Befestigung prüfen"
        text: "Wir prüfen Zugang, Befestigungspunkte, Material und passende Netzvarianten."
      - number: "03"
        title: "Offerte erhalten"
        text: "Sie erhalten eine Offerte für die besprochene Katzenschutz-Lösung."
      - number: "04"
        title: "Montage und Erklärung"
        text: "Die Lösung wird montiert und Sie sehen, worauf Sie im Alltag achten müssen."
    closing_text: "Schicken Sie ein, zwei Fotos vom Balkon oder Fenster. Wir sagen Ihnen, welche Lösung passt und was sie kostet."
    faq:
      - question: "Muss jemand vor Ort vorbeikommen?"
        answer: "Oft reichen Fotos für die erste Einschätzung. Wenn Befestigung, Zugang oder Masse unklar sind, vereinbaren wir eine Besichtigung."
      - question: "Gibt es verschiedene Netzvarianten?"
        answer: "Ja. Die Variante hängt von Katze, Ort, Befestigung und gewünschter Nutzung ab."
      - question: "Können auch Katzentürli oder Leitern umgesetzt werden?"
        answer: "Ja. Katzentürli und Katzenleitern können Teil der Lösung sein, wenn die bauliche Situation dafür passt."
      - question: "Ist das auch für Mietwohnungen möglich?"
        answer: "Das hängt von Befestigung und Vorgaben der Verwaltung oder Eigentümerschaft ab. Wir klären die technische Seite, Sie klären die Erlaubnis."

  - slug: "hauswartungen"
    title: "Hauswartungen"
    nav_title: "Hauswartungen"
    url: "/leistungen/hauswartungen/"
    icon: "home"
    image: "/assets/images/services/hauswartung-seftigen.webp"
    card_image: "/assets/images/services/hauswartung-seftigen-card.webp"
    image_alt: "Gepflegter Aussenbereich einer Liegenschaft"
    short: "Pflege, Kontrollgänge, Wohnungsaufbereitung und kleine Arbeiten rund um Ihre Liegenschaft."
    meta: "Pflege, Kontrolle und Wohnungsaufbereitung"
    cta: "Offerte anfragen"
    secondary_label: "Projekte ansehen"
    secondary_url: "/projekte/"
    hero_title: "Hauswartungen mit persönlicher Verantwortung."
    hero_text: "HandwerksPartner24 übernimmt Pflege, Kontrollgänge, kleine Reparaturen und Wohnungsaufbereitung rund um Ihre Liegenschaft. Wir klären Aufgabenliste, Rhythmus und Zuständigkeiten, bevor die Einsätze starten."
    detail_title: "Liegenschaftspflege mit klarem Auftrag."
    detail_text: "Vielleicht geht es um eine regelmässige Betreuung, einzelne Kontrollgänge oder eine Wohnung, die für die Neuvermietung bereit sein muss. Wir legen mit Ihnen fest, welche Räume, Wege und Aussenflächen dazugehören und wie Sie im Alltag von uns hören."
    bullets_title: "Typische Leistungen"
    bullets:
      - "Reinigung von Eingängen, Treppenhaus und Gemeinschaftsflächen"
      - "Umgebungspflege, Aussenanlagen und kleinere Gartenarbeiten"
      - "Kleine Reparaturen und Instandhaltung"
      - "Kontrollgänge und Mängelhinweise"
      - "Wohnungsaufbereitung, Reparaturen und End-/Grundreinigung nach Absprache"
      - "Winterdienst nach Absprache"
    fit_title: "Geeignet für"
    fit:
      - "Private Liegenschaftsbesitzer"
      - "Liegenschaftsverwaltungen und Eigentümergemeinschaften"
      - "Gewerbeobjekte, Praxen und kleine Betriebe"
    problems_title: "Häufige Ausgangslagen"
    problems:
      - "Unklare Zuständigkeiten im Gebäudealltag"
      - "Mängel werden zu spät entdeckt"
      - "Kleine Arbeiten bleiben liegen"
      - "Wohnungsübergaben brauchen Reparatur, Aufbereitung und Koordination"
    process_title: "So wird die Hauswartung klar geregelt."
    process:
      - number: "01"
        title: "Objekt beschreiben"
        text: "Sie nennen Liegenschaft, Räume, Aussenflächen und die Aufgaben, die regelmässig oder einmalig anfallen."
      - number: "02"
        title: "Rhythmus festlegen"
        text: "Wir besprechen Einsatzhäufigkeit, Kontaktperson, Rückmeldungen und Arbeiten, die zusätzlich möglich sind."
      - number: "03"
        title: "Offerte erhalten"
        text: "Sie erhalten ein klares Angebot für Objekt, Aufgabenliste und Einsatzrhythmus."
      - number: "04"
        title: "Einsätze starten"
        text: "Nach Ihrer Zusage werden die Arbeiten ausgeführt und wichtige Beobachtungen zurückgemeldet."
    closing_text: "Beschreiben Sie kurz Ihr Objekt und was anfällt. Wir schlagen einen Rhythmus vor und halten ihn in einer Offerte fest."
    faq:
      - question: "Sind regelmässige Einsätze möglich?"
        answer: "Ja. Wir klären Objekt, Aufgabenliste, Einsatzrhythmus und Kontaktperson vor der Offerte."
      - question: "Übernehmen Sie auch kleine Reparaturen?"
        answer: "Ja. Kleine Reparaturen und Instandhaltungsarbeiten gehören zum Angebot."
      - question: "Gibt es fixe Preise?"
        answer: "Die Kosten richten sich nach Objekt, Aufgabenliste und Einsatzrhythmus. Sie erhalten eine Offerte vor Start der Einsätze."

  - slug: "technischer-dienst"
    title: "Technischer Dienst"
    nav_title: "Technischer Dienst"
    url: "/leistungen/technischer-dienst/"
    icon: "wrench"
    image: "/assets/images/services/technischer-dienst-dohlenweg.webp"
    card_image: "/assets/images/services/technischer-dienst-dohlenweg-card.webp"
    image_alt: "Sanitär- und Innenbereich nach technischer Arbeit"
    short: "Unterhalt, Vertretung, Koordination und technische Aufgaben mit Erfahrung aus dem Gebäudebetrieb."
    meta: "Gebäudebetrieb, Vertretung und Koordination"
    cta: "Offerte anfragen"
    secondary_label: "Über uns"
    secondary_url: "/ueber-renzo/"
    hero_title: "Technischer Dienst für Gebäude, Betriebe und Institutionen."
    hero_text: "Mit Erfahrung aus technischem Dienst, Hausdienst, Bau/Sicherheit und Betriebsleitung unterstützt HandwerksPartner24 dort, wo Unterhalt, Kontrollen und praktische Organisation verlässlich laufen müssen."
    detail_title: "Technische Unterstützung mit Übersicht."
    detail_text: "Viele technische Aufgaben sind nicht nur handwerklich. Es braucht klare Zuständigkeiten, rechtzeitige Rückfragen und eine Person, die den Überblick über Unterhalt, Störungen, externe Dienstleister und Betriebssicherheit behält."
    bullets_title: "Typische Leistungen"
    bullets:
      - "Betreuung technischer Aufgaben im Gebäudebetrieb"
      - "Wartungs- und Kontrollaufgaben"
      - "Koordination externer Dienstleister"
      - "Kleine Reparaturen und Unterhaltsarbeiten"
      - "Ferienvertretung oder temporäre Unterstützung bei Ausfällen nach Absprache"
      - "Ordnung, Sauberkeit und Betriebssicherheit im vereinbarten Aufgabenbereich"
    fit_title: "Geeignet für"
    fit:
      - "Institutionen, Alters- und Pflegeheime mit Unterhaltsaufgaben"
      - "KMU und Betriebe mit Gebäudebetrieb"
      - "Verwaltungen ohne eigene technische Ansprechperson"
    problems_title: "Häufige Ausgangslagen"
    problems:
      - "Fehlende Übersicht über Unterhaltsthemen"
      - "Viele externe Kontakte ohne klare Koordination"
      - "Praktische technische Aufgaben bleiben liegen"
      - "Ferien, Krankheit oder Personalausfall müssen überbrückt werden"
    process_title: "So wird technische Unterstützung greifbar."
    process:
      - number: "01"
        title: "Aufgaben aufnehmen"
        text: "Sie beschreiben, wo im Gebäude oder Betrieb Unterstützung gebraucht wird."
      - number: "02"
        title: "Verantwortung ordnen"
        text: "Wir gehen Zuständigkeiten, Erreichbarkeit, externe Kontakte und mögliche Risiken mit Ihnen durch."
      - number: "03"
        title: "Einsatz abgrenzen"
        text: "Sie erhalten eine Offerte für klar definierte technische Aufgaben oder eine zeitlich begrenzte Vertretung."
      - number: "04"
        title: "Rückmeldungen bündeln"
        text: "Während des Einsatzes bleiben Rückfragen, Mängel und externe Kontakte nachvollziehbar dokumentiert."
    closing_text: "Sagen Sie uns, wo es im Betrieb klemmt. Wir ordnen die Aufgaben ein und melden uns mit den nächsten Schritten."
    faq:
      - question: "Kann HandwerksPartner24 externe Dienstleister koordinieren?"
        answer: "Ja. Wenn es zum Auftrag gehört, koordinieren wir externe Dienstleister und bündeln die Rückmeldungen."
      - question: "Ist das nur für grosse Gebäude?"
        answer: "Nein. Auch kleinere Betriebe oder Liegenschaften können technische Unterstützung benötigen."
      - question: "Sind Ferienvertretungen möglich?"
        answer: "Ja, wenn Aufgaben, Dauer, Erreichbarkeit und Verantwortlichkeiten vorab klar geregelt sind."

