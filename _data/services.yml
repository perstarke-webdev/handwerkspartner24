    hero_title: "Kleinere Umbauten und Sanierungen sauber geplant."
    hero_text: "Wenn eine Arbeit zu gross für eine Kleinreparatur, aber zu klein für ein grosses Bauprojekt wirkt, ist HandwerksPartner24 der richtige erste Kontakt. Wir klären Zustand, Material, Bestand und gewünschtes Ergebnis und erstellen danach die Offerte."
