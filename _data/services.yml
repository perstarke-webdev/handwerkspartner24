    process_title: "So wird aus der Idee ein klarer Umbau."
    process:
      - number: "01"
        title: "Wunsch beschreiben"
        text: "Sie erzählen, was geändert werden soll und welche Situation heute vorhanden ist."
      - number: "02"
        title: "Bestand prüfen"
        text: "Wenn Fotos nicht reichen, schauen wir Material, Masse und Anschlüsse vor Ort an."
      - number: "03"
        title: "Offerte erhalten"
        text: "Sie erhalten ein Angebot für die besprochene Anpassung und den klar abgegrenzten Umfang."
      - number: "04"
        title: "Ausführen und übergeben"
        text: "Nach Ihrer Zusage wird die Arbeit umgesetzt und am Schluss persönlich erklärt."
    closing_text: "Erzählen Sie uns, was umgebaut werden soll. Wenn nötig schauen wir es vor Ort an, dann erhalten Sie Ihre Offerte."
    faq:
      - question: "Übernehmen Sie grosse Sanierungen?"
        answer: "Der Fokus liegt auf kleineren Umbauten und Sanierungen. Grössere Projekte werden zuerst abgegrenzt, damit klar ist, was HandwerksPartner24 übernehmen kann."
      - question: "Kann eine Besichtigung nötig sein?"
        answer: "Ja. Bei Umbauten ist eine Besichtigung oft nötig, damit Masse, Material, Bestand und Aufwand in der Offerte stimmen."
      - question: "Gibt es Projektbilder?"
        answer: "Ja. Auf der Projekte-Seite finden Sie Eindrücke aus Bad Sanierung, Umbau und weiteren Arbeiten."

